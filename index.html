<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>從零手刻 LLM：Transformer 核心原理互動電子書 — 線上讀書器</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- KaTeX for Math Equations -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    
    <!-- Highlight.js for Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    
    <!-- Marked for Markdown Parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>

    <style>
        :root {
            --bg-color: #0b0f19;
            --container-bg: rgba(17, 24, 39, 0.7);
            --sidebar-bg: rgba(15, 23, 42, 0.9);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --border-color: rgba(255, 255, 255, 0.08);
            --code-bg: #1e293b;
            --card-bg: #111827;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-mono: 'Fira Code', monospace;
        }

        .light-theme {
            --bg-color: #f8fafc;
            --container-bg: rgba(255, 255, 255, 0.8);
            --sidebar-bg: rgba(241, 245, 249, 0.95);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent-color: #4f46e5;
            --accent-hover: #3730a3;
            --border-color: rgba(0, 0, 0, 0.08);
            --code-bg: #f1f5f9;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Reading Progress Bar */
        #progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            width: 0%;
            z-index: 1000;
        }

        /* Sidebar Styling */
        aside {
            width: 320px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            flex-shrink: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-title {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .toc-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
        }

        .toc-item {
            display: block;
            padding: 10px 12px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 4px;
            line-height: 1.4;
            cursor: pointer;
        }

        .toc-item:hover {
            background-color: var(--border-color);
            color: var(--text-primary);
        }

        .toc-item.active {
            background-color: var(--accent-color);
            color: #ffffff;
            font-weight: 500;
        }

        .toc-h1 { font-weight: 600; padding-left: 12px; }
        .toc-h2 { padding-left: 24px; font-size: 0.85rem; }
        .toc-h3 { padding-left: 36px; font-size: 0.8rem; display: none; }

        /* Main Content Styling */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        header {
            height: 70px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            backdrop-filter: blur(12px);
            background-color: rgba(11, 15, 25, 0.3);
            z-index: 50;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .toggle-sidebar-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 1.2rem;
            display: none;
        }

        .theme-toggle-btn {
            background: var(--border-color);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-toggle-btn:hover {
            background-color: var(--accent-color);
            color: #ffffff;
        }

        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 60px 80px;
            scroll-behavior: smooth;
        }

        .content-container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Typography of markdown */
        #markdown-content {
            line-height: 1.8;
            font-size: 1.05rem;
        }

        #markdown-content h1, 
        #markdown-content h2, 
        #markdown-content h3 {
            margin-top: 2.2rem;
            margin-bottom: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            scroll-margin-top: 90px;
        }

        #markdown-content h1 {
            font-size: 2.2rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
            margin-top: 1rem;
        }

        #markdown-content h2 {
            font-size: 1.6rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        #markdown-content h3 {
            font-size: 1.25rem;
        }

        #markdown-content p {
            margin-bottom: 1.5rem;
            color: var(--text-secondary);
        }

        .light-theme #markdown-content p {
            color: #334155;
        }

        #markdown-content ul, 
        #markdown-content ol {
            margin-bottom: 1.5rem;
            padding-left: 24px;
            color: var(--text-secondary);
        }

        .light-theme #markdown-content ul,
        .light-theme #markdown-content ol {
            color: #334155;
        }

        #markdown-content li {
            margin-bottom: 0.5rem;
        }

        #markdown-content code {
            font-family: var(--font-mono);
            background-color: var(--code-bg);
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 0.9em;
            color: #f43f5e;
        }

        #markdown-content pre {
            margin: 1.8rem 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        #markdown-content pre code {
            display: block;
            padding: 20px;
            overflow-x: auto;
            background-color: #0d1117 !important;
            color: #c9d1d9;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* KaTeX Block Adjustments */
        .katex-display {
            margin: 1.5em 0;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 10px 0;
        }

        /* Custom Alert Blocks */
        blockquote {
            margin: 1.8rem 0;
            padding: 16px 20px;
            border-left: 4px solid var(--accent-color);
            background-color: rgba(99, 102, 241, 0.08);
            border-radius: 0 8px 8px 0;
        }

        blockquote p {
            margin-bottom: 0 !important;
            color: var(--text-primary) !important;
            font-weight: 500;
        }

        blockquote strong {
            color: var(--accent-color);
            display: block;
            margin-bottom: 4px;
        }

        /* Visualizer containers */
        .interactive-visualizer {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            margin: 24px 0;
        }

        .visualizer-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
        }

        .btn-outline:hover {
            background-color: var(--accent-color);
            color: white;
        }

        /* CNN Visualizer grid styling */
        .grid-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 16px;
        }

        .matrix-wrapper {
            text-align: center;
        }

        .matrix-title {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .grid {
            display: grid;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            background-color: rgba(0,0,0,0.1);
        }

        .cell {
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .cell.highlight {
            background-color: rgba(99, 102, 241, 0.4);
            border-color: #6366f1;
            font-weight: 700;
            transform: scale(1.05);
        }

        .cell.output-active {
            background-color: rgba(168, 85, 247, 0.4);
            border-color: #a855f7;
            font-weight: 700;
        }

        /* Autograd Visualizer styling */
        .autograd-flow {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .control-row {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 120px;
        }

        .slider-group label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .slider-group input {
            cursor: pointer;
        }

        .graph-svg {
            width: 100%;
            height: 180px;
            background-color: rgba(0,0,0,0.1);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .node-circle {
            fill: var(--card-bg);
            stroke: var(--accent-color);
            stroke-width: 2;
        }

        .node-text {
            fill: var(--text-primary);
            font-size: 14px;
            font-family: var(--font-mono);
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .edge-line {
            stroke: var(--text-secondary);
            stroke-width: 2;
            fill: none;
        }

        .edge-line.active {
            stroke: #a855f7;
            stroke-width: 3;
            stroke-dasharray: 5;
            animation: dash 1s linear infinite;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -10;
            }
        }

        .flowing-particle {
            fill: #a855f7;
            r: 5;
        }

        /* Attention Visualizer styling */
        .attention-words {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .word-tag {
            padding: 6px 12px;
            background-color: var(--border-color);
            border-radius: 16px;
            font-size: 0.9rem;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
        }

        .word-tag.active {
            background-color: var(--accent-color);
            color: white;
            font-weight: 600;
        }

        .attention-matrix {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            margin: 20px auto;
            max-width: 300px;
        }

        .attention-cell {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.7rem;
            font-family: var(--font-mono);
            background-color: rgba(99, 102, 241, 0.05);
            border-radius: 4px;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
        }



        /* LLM-first visualizers */
        .viz-note {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin: 8px 0 14px;
        }

        .flow-strip {
            display: flex;
            align-items: stretch;
            gap: 10px;
            flex-wrap: wrap;
            margin: 16px 0;
        }

        .flow-node {
            flex: 1;
            min-width: 110px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            background: rgba(99, 102, 241, 0.08);
            text-align: center;
            position: relative;
        }

        .flow-node.active {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.25), 0 0 18px rgba(99, 102, 241, 0.25);
            transform: translateY(-2px);
        }

        .flow-node .label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .flow-node .value {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: var(--text-primary);
            word-break: break-word;
        }

        .shape-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-top: 14px;
        }

        .shape-card {
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            background: rgba(0,0,0,0.10);
        }

        .shape-card strong {
            color: var(--accent-color);
        }

        .shape-card code, .viz-code {
            font-family: var(--font-mono);
            color: #a855f7;
            font-size: 0.86rem;
        }

        .viz-output {
            margin-top: 12px;
            padding: 12px;
            border-radius: 10px;
            background: rgba(0,0,0,0.16);
            border: 1px solid var(--border-color);
            font-family: var(--font-mono);
            font-size: 0.86rem;
            color: var(--text-primary);
            overflow-x: auto;
        }

        .mask-matrix {
            display: grid;
            gap: 6px;
            justify-content: center;
            margin: 16px 0;
        }

        .mask-cell {
            width: 58px;
            height: 46px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            background: rgba(0,0,0,0.12);
        }

        .mask-cell.allowed {
            background: rgba(34, 197, 94, 0.20);
            border-color: rgba(34, 197, 94, 0.55);
        }

        .mask-cell.blocked {
            background: rgba(244, 63, 94, 0.18);
            border-color: rgba(244, 63, 94, 0.45);
            color: #fca5a5;
        }

        .rope-stage {
            display: grid;
            grid-template-columns: minmax(240px, 1fr) minmax(220px, 1fr);
            gap: 18px;
            align-items: center;
        }

        .rope-canvas {
            width: 100%;
            min-height: 230px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: radial-gradient(circle at center, rgba(99,102,241,0.15), rgba(0,0,0,0.10));
        }

        .cache-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin: 8px 0 14px;
        }

        .cache-token {
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: rgba(99, 102, 241, 0.12);
            font-family: var(--font-mono);
            font-size: 0.8rem;
        }

        .cache-token.new {
            background: rgba(168, 85, 247, 0.25);
            border-color: #a855f7;
        }

        .mini-llm-layers {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }

        .mini-layer {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 10px;
            align-items: center;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 12px;
            background: rgba(0,0,0,0.10);
        }

        .mini-layer.active {
            border-color: var(--accent-color);
            background: rgba(99, 102, 241, 0.16);
        }

        @media (max-width: 700px) {
            .rope-stage { grid-template-columns: 1fr; }
            .mask-cell { width: 44px; height: 38px; font-size: 0.68rem; }
            .mini-layer { grid-template-columns: 1fr; }
        }

        /* Responsive Design */
        @media (max-width: 900px) {
            aside {
                position: absolute;
                left: -320px;
                transition: transform 0.3s ease;
            }

            aside.open {
                transform: translateX(320px);
            }

            .toggle-sidebar-btn {
                display: block;
            }

            header {
                padding: 0 20px;
            }

            .content-body {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>
    <div id="progress-bar"></div>

    <!-- Sidebar / TOC -->
    <aside id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">LLM Interactive Book</div>
            <button class="theme-toggle-btn" id="sidebar-close-btn" style="display: none;">✕</button>
        </div>
        <div class="toc-container" id="toc">
            <!-- TOC links generated dynamically -->
        </div>
    </aside>

    <!-- Main Reading Content -->
    <main>
        <header>
            <div class="header-left">
                <button class="toggle-sidebar-btn" id="menu-toggle">☰</button>
                <h2 style="font-size: 1.1rem; font-weight: 600;" id="current-chapter-title">從零開始學 AI</h2>
            </div>
            <button class="theme-toggle-btn" id="theme-toggle">
                <span id="theme-icon">☀️</span> <span id="theme-text">Light Mode</span>
            </button>
        </header>

        <div class="content-body" id="scroll-container">
            <div class="content-container">
                <article id="markdown-content">
                    <p style="text-align: center; color: var(--text-secondary); margin-top: 100px;">正在載入書籍內容，請稍候...</p>
                </article>
            </div>
        </div>
    </main>

    <script>
        // Theme Management
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');
        
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            themeIcon.textContent = isLight ? '🌙' : '☀️';
            themeText.textContent = isLight ? 'Dark Mode' : 'Light Mode';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        });

        // Load saved theme
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-theme');
            themeIcon.textContent = '🌙';
            themeText.textContent = 'Dark Mode';
        }

        // Sidebar Toggle for Mobile
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });

        // Reading Progress Indicator
        const scrollContainer = document.getElementById('scroll-container');
        const progressBar = document.getElementById('progress-bar');
        
        scrollContainer.addEventListener('scroll', () => {
            const totalHeight = scrollContainer.scrollHeight - scrollContainer.clientHeight;
            if (totalHeight > 0) {
                const progress = (scrollContainer.scrollTop / totalHeight) * 100;
                progressBar.style.width = `${progress}%`;
            }
        });

        // Fetch and Render Markdown
        async function loadBook() {
            try {
                const response = await fetch('AI_Knowledge_Book.md?t=' + new Date().getTime());
                if (!response.ok) throw new Error('無法讀取 AI_Knowledge_Book.md，請確認檔案是否存在於同級目錄中');
                let markdown = await response.text();

                // 1. Math preprocessing (Extract math so marked doesn't escape it)
                const mathBlocks = [];
                const mathInlines = [];

                // Replace Block Math $$...$$
                markdown = markdown.replace(/\$\$([\s\S]+?)\$\$/g, (match, math) => {
                    mathBlocks.push(math.trim());
                    return `@@BLOCKMATH_${mathBlocks.length - 1}@@`;
                });

                // Replace Inline Math $...$
                markdown = markdown.replace(/\$([^$\n]+?)\$/g, (match, math) => {
                    mathInlines.push(math.trim());
                    return `@@INLINEMATH_${mathInlines.length - 1}@@`;
                });

                // Custom renderer for alerts (e.g. > [!NOTE] or > [!TIP])
                const renderer = new marked.Renderer();
                
                const originalBlockquote = renderer.blockquote.bind(renderer);
                renderer.blockquote = (quote) => {
                    let alertType = "";
                    let cleanQuote = quote;
                    
                    if (quote.includes("[!NOTE]")) {
                        alertType = "NOTE";
                        cleanQuote = quote.replace(/\[!NOTE\]\s*/g, "<strong>📌 學習筆記</strong>");
                    } else if (quote.includes("[!TIP]")) {
                        alertType = "TIP";
                        cleanQuote = quote.replace(/\[!TIP\]\s*/g, "<strong>💡 實作技巧</strong>");
                    } else if (quote.includes("[!IMPORTANT]")) {
                        alertType = "IMPORTANT";
                        cleanQuote = quote.replace(/\[!IMPORTANT\]\s*/g, "<strong>⚠️ 重要事項</strong>");
                    }
                    
                    if (alertType) {
                        return `<blockquote class="alert-${alertType.toLowerCase()}">${cleanQuote}</blockquote>`;
                    }
                    return originalBlockquote(quote);
                };

                marked.setOptions({
                    renderer: renderer,
                    langPrefix: 'hljs language-'
                });

                // 2. Parse Markdown
                let html = marked.parse(markdown);

                // 3. Post-process: Insert rendered LaTeX back into HTML
                html = html.replace(/@@BLOCKMATH_(\d+)@@/g, (match, index) => {
                    try {
                        return katex.renderToString(mathBlocks[index], { displayMode: true, throwOnError: false });
                    } catch (e) {
                        return `<span style="color:red">${mathBlocks[index]}</span>`;
                    }
                });

                html = html.replace(/@@INLINEMATH_(\d+)@@/g, (match, index) => {
                    try {
                        return katex.renderToString(mathInlines[index], { displayMode: false, throwOnError: false });
                    } catch (e) {
                        return `<span style="color:red">${mathInlines[index]}</span>`;
                    }
                });

                // Insert into page
                document.getElementById('markdown-content').innerHTML = html;

                // 4. Generate Table of Contents
                buildTOC();
                
                // Trigger Highlight.js manually if available
                if (typeof hljs !== 'undefined') {
                    document.querySelectorAll('pre code').forEach((el) => {
                        hljs.highlightElement(el);
                    });
                }

                // 5. Initialize Interactive Visualizers
                initLlmFlowVisualizer();
                initTensorShapeVisualizer();
                initAutogradVisualizer();
                initCnnVisualizer();
                initAttentionVisualizer();
                initCausalMaskVisualizer();
                initRopeVisualizer();
                initKvCacheVisualizer();
                initMiniLlmVisualizer();

            } catch (err) {
                document.getElementById('markdown-content').innerHTML = `
                    <div style="color: #f43f5e; padding: 20px; border: 1px solid #f43f5e; border-radius: 8px; background-color: rgba(244, 63, 94, 0.1);">
                        <h3>讀取失敗</h3>
                        <p>${err.message}</p>
                    </div>
                `;
            }
        }

        // Build Table of Contents
        function buildTOC() {
            const tocContainer = document.getElementById('toc');
            const headings = document.getElementById('markdown-content').querySelectorAll('h1, h2, h3');
            tocContainer.innerHTML = '';

            headings.forEach((heading, index) => {
                if (!heading.id) {
                    heading.id = `heading-${index}`;
                }

                const item = document.createElement('a');
                item.href = `#${heading.id}`;
                item.className = `toc-item toc-${heading.tagName.toLowerCase()}`;
                item.textContent = heading.textContent.replace(/[📌💡⚠️📖]/g, '').trim();
                
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    heading.scrollIntoView({ behavior: 'smooth' });
                    sidebar.classList.remove('open');
                    
                    document.querySelectorAll('.toc-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    document.getElementById('current-chapter-title').textContent = item.textContent;
                });

                tocContainer.appendChild(item);
            });

            const observerOptions = {
                root: scrollContainer,
                rootMargin: '0px 0px -60% 0px',
                threshold: 0
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.id;
                        const tocItem = document.querySelector(`.toc-item[href="#${id}"]`);
                        if (tocItem) {
                            document.querySelectorAll('.toc-item').forEach(el => el.classList.remove('active'));
                            tocItem.classList.add('active');
                            document.getElementById('current-chapter-title').textContent = tocItem.textContent;
                        }
                    }
                });
            }, observerOptions);

            headings.forEach(heading => observer.observe(heading));
        }

                        const z = u * inputs.w;

                    }, 800);
                }, 800);

            btnBackward.addEventListener('click', async () => {
                const inputs = getInputs();
                const u = inputs.x + inputs.y;
                const z = u * inputs.w;
                
                textU.textContent = `u = ${u}`;
                textZ.textContent = `z = ${z}`;
                
                glowDot.style.display = 'block';
                
                // Gradient calculations
                const dz_dz = 1;
                const dz_du = inputs.w;
                const dz_dw = u;
                const dz_dx = dz_du * 1;
                const dz_dy = dz_du * 1;

                // Animate glowing particle flowing backwards
                // Step 1: z to u & w
                await animateDot(340, 90, 170, 70, 800);
                gradU.textContent = `∂z/∂u = ${dz_du}`;
                gradU.style.display = 'block';
                
                await animateDot(340, 90, 60, 160, 800);
                gradW.textContent = `∂z/∂w = ${dz_dw}`;
                gradW.style.display = 'block';

                // Step 2: u to x & y
                await animateDot(170, 70, 60, 40, 800);
                gradX.textContent = `∂z/∂x = ${dz_dx}`;
                gradX.style.display = 'block';

                await animateDot(170, 70, 60, 110, 800);
                gradY.textContent = `∂z/∂y = ${dz_dy}`;
                gradY.style.display = 'block';
                
                glowDot.style.display = 'none';
            });

            function animateDot(x1, y1, x2, y2, duration) {
                return new Promise(resolve => {
                    const start = performance.now();
                    function step(now) {
                        const elapsed = now - start;
                        const progress = Math.min(elapsed / duration, 1);
                        // Linear interpolation
                        const x = x1 + (x2 - x1) * progress;
                        const y = y1 + (y2 - y1) * progress;
                        glowDot.setAttribute('cx', x);
                        glowDot.setAttribute('cy', y);
                        
                        if (progress < 1) {
                            requestAnimationFrame(step);
                        } else {
                            resolve();
                        }
                    }
                    requestAnimationFrame(step);
                });
            }
        }

            ];
            const kernelData = [
                [1, 0, 1],
                [0, 1, 0],
                [1, 0, 1]
            ];
            const outputData = [
                [4, 3, 4],
                [2, 4, 3],
                [2, 3, 4]
            ];

                    el.textContent = '?';

                    playInterval = null;
                    btnPlay.textContent = "播放 (Play)";
                    return;

                btnPlay.textContent = "暫停 (Pause)";
                playInterval = setInterval(() => {
                    runCnnStep(currentStep);
                    currentStep = (currentStep + 1) % 9;
                }, 1200);

            function runCnnStep(step) {
                // Remove all highlights
                document.querySelectorAll('#cnn-input-grid .cell').forEach(c => c.classList.remove('highlight'));

                        }
                    }
                }
                
                mathInfo.textContent = calculationText.slice(0, -3) + ` = ${sum}`;

        }

            ids.forEach(id => document.getElementById(`shape-${id}`).addEventListener('input', render));
            function render() {
                let B = +document.getElementById('shape-b').value;
                let T = +document.getElementById('shape-t').value;
                let C = +document.getElementById('shape-c').value;
                let H = +document.getElementById('shape-h').value;
                if (C % H !== 0) H = [...Array(8).keys()].map(x => x + 1).filter(x => C % x === 0).reduce((a,b) => Math.abs(b-H)<Math.abs(a-H)?b:a, 1);
                document.getElementById('shape-h').value = H;
                const D = C / H;
                document.getElementById('shape-b-val').textContent = B;
                document.getElementById('shape-t-val').textContent = T;
                document.getElementById('shape-c-val').textContent = C;
                document.getElementById('shape-h-val').textContent = H;
                document.getElementById('shape-output').innerHTML = [
                    ['input_ids', `(${B}, ${T})`, '文字 token 的整數 ID'],
                    ['embedding', `(${B}, ${T}, ${C})`, '每個 token 的 hidden vector'],
                    ['q/k/v', `(${B}, ${T}, ${C})`, 'Linear projection 後'],
                    ['split heads', `(${B}, ${H}, ${T}, ${D})`, '拆成多個注意力頭'],
                    ['attention scores', `(${B}, ${H}, ${T}, ${T})`, '每個 token 看每個 token'],
                    ['logits', `(${B}, ${T}, V)`, '對 vocabulary 的分數']
                ].map(([name, shape, desc]) => `<div class="shape-card"><strong>${name}</strong><br><code>${shape}</code><br><span class="viz-note">${desc}</span></div>`).join('');
            }
            render();
        }

        // --- 6. Causal Mask Visualizer ---
        function initCausalMaskVisualizer() {
            const container = document.getElementById('causal-mask-visualizer');
            if (!container) return;
            const tokens = ['我', '喜歡', '學', 'AI'];
            container.innerHTML = `
                <div class="visualizer-title"><span>Causal Mask：Decoder-only LLM 不能偷看未來</span></div>
                <p class="viz-note">列代表 Query token，欄代表它可以看的 Key token。紅色 ❌ 會在 softmax 前被設成 -∞。</p>
                <div class="mask-matrix" id="causal-mask-grid"></div>
                <div class="viz-output" id="causal-mask-info">點擊任一列查看該 token 可見範圍。</div>
            `;
            const grid = document.getElementById('causal-mask-grid');
            grid.style.gridTemplateColumns = `repeat(${tokens.length + 1}, 58px)`;
            grid.appendChild(maskCell('', ''));
            tokens.forEach(t => grid.appendChild(maskCell(t, '')));
            tokens.forEach((rowTok, r) => {
                grid.appendChild(maskCell(rowTok, ''));
                tokens.forEach((colTok, c) => {
                    const allowed = c <= r;
                    const cell = maskCell(allowed ? '✅' : '❌', allowed ? 'allowed' : 'blocked');
                    cell.title = `${rowTok} ${allowed ? '可以看' : '不能看'} ${colTok}`;
                    cell.addEventListener('click', () => {
                        document.getElementById('causal-mask-info').innerHTML = `<strong>${rowTok}</strong> 只能看：${tokens.slice(0, r + 1).join('、')}<br><span style="color:var(--text-secondary)">未來 token：${tokens.slice(r + 1).join('、') || '無'} → attention weight = 0</span>`;
                    });
                    grid.appendChild(cell);
                });
            });
            function maskCell(text, cls) {
                const div = document.createElement('div');
                div.className = `mask-cell ${cls}`;
                div.textContent = text;
                return div;
            }
        }

        // --- 7. RoPE Rotation Visualizer ---
        function initRopeVisualizer() {
            const container = document.getElementById('rope-visualizer');
            if (!container) return;
            container.innerHTML = `
                <div class="visualizer-title"><span>RoPE：位置越後面，向量旋轉越多</span></div>
                <div class="rope-stage">
                    <svg class="rope-canvas" viewBox="0 0 260 220" id="rope-svg">
                        <circle cx="130" cy="110" r="80" fill="none" stroke="var(--border-color)"/>
                        <line x1="50" y1="110" x2="210" y2="110" stroke="var(--border-color)"/>
                        <line x1="130" y1="30" x2="130" y2="190" stroke="var(--border-color)"/>
                        <line id="rope-vector" x1="130" y1="110" x2="200" y2="110" stroke="#a855f7" stroke-width="4" stroke-linecap="round"/>
                        <circle id="rope-dot" cx="200" cy="110" r="6" fill="#a855f7"/>
                        <text x="130" y="205" text-anchor="middle" fill="var(--text-secondary)" font-size="11">旋轉後的 Q/K 向量</text>
                    </svg>
                    <div>
                        <div class="slider-group"><label>Position m = <span id="rope-pos-val">0</span></label><input id="rope-pos" type="range" min="0" max="12" value="0"></div>
                        <div class="slider-group"><label>Base angle θ = <span id="rope-theta-val">22.5°</span></label><input id="rope-theta" type="range" min="10" max="45" value="22.5" step="2.5"></div>
                        <div class="viz-output" id="rope-info"></div>
                    </div>
                </div>
            `;
            document.getElementById('rope-pos').addEventListener('input', render);
            document.getElementById('rope-theta').addEventListener('input', render);
            function render() {
                const pos = +document.getElementById('rope-pos').value;
                const thetaDeg = +document.getElementById('rope-theta').value;
                const angle = pos * thetaDeg * Math.PI / 180;
                const x = 130 + Math.cos(angle) * 70;
                const y = 110 - Math.sin(angle) * 70;
                document.getElementById('rope-vector').setAttribute('x2', x.toFixed(2));
                document.getElementById('rope-vector').setAttribute('y2', y.toFixed(2));
                document.getElementById('rope-dot').setAttribute('cx', x.toFixed(2));
                document.getElementById('rope-dot').setAttribute('cy', y.toFixed(2));
                document.getElementById('rope-pos-val').textContent = pos;
                document.getElementById('rope-theta-val').textContent = `${thetaDeg}°`;
                document.getElementById('rope-info').innerHTML = `旋轉角度 mθ = ${pos} × ${thetaDeg}° = <strong>${(pos * thetaDeg).toFixed(1)}°</strong><br>RoPE 套用後 shape 不變：<span class="viz-code">(B, H, T, D)</span>`;
            }
            render();
        }

        // --- 8. KV Cache Timeline Visualizer ---
        function initKvCacheVisualizer() {
            const container = document.getElementById('kv-cache-visualizer');
            if (!container) return;
            const prompt = ['我', '喜歡'];
            const generated = ['學', 'AI', '的', '原理'];
            let step = 0;
            container.innerHTML = `
                <div class="visualizer-title">
                    <span>KV Cache Timeline：每次 decode 只新增一格 K/V</span>
                    <button class="btn" id="btn-kv-step">Decode 下一個 token</button>
                </div>
                <p class="viz-note">Prefill 先建立 prompt 的 K/V cache；decode 階段每次只 append 新 token 的 K/V。</p>
                <div><strong>K cache</strong><div class="cache-row" id="k-cache-row"></div></div>
                <div><strong>V cache</strong><div class="cache-row" id="v-cache-row"></div></div>
                <div class="viz-output" id="kv-cache-info"></div>
            `;
            document.getElementById('btn-kv-step').addEventListener('click', () => {
                step = (step + 1) % (generated.length + 1);
                render();
            });
            function render() {
                const tokens = prompt.concat(generated.slice(0, step));
                const rows = ['k-cache-row', 'v-cache-row'];
                rows.forEach(rowId => {
                    const row = document.getElementById(rowId);
                    row.innerHTML = '';
                    tokens.forEach((tok, i) => {
                        const el = document.createElement('span');
                        el.className = `cache-token ${i === tokens.length - 1 && step > 0 ? 'new' : ''}`;
                        el.textContent = `${tok} ${rowId[0].toUpperCase()}`;
                        row.appendChild(el);
                    });
                });
                const pastLen = tokens.length;
                document.getElementById('kv-cache-info').innerHTML = `目前 cache length = <strong>${pastLen}</strong><br>K/V shape: <span class="viz-code">(B, H, ${pastLen}, D)</span><br>本步 attention scores: <span class="viz-code">(B, H, 1, ${pastLen})</span>`;
            }
            render();
        }

        // --- 9. Mini Decoder-only LLM Forward Visualizer ---
        function initMiniLlmVisualizer() {
            const container = document.getElementById('mini-llm-visualizer');
            if (!container) return;
            const layers = [
                ['input_ids', '(B=1, T=4)', '[3, 8, 12, 20]'],
                ['Token Embedding', '(1, 4, C=8)', '查表成向量'],
                ['Block 1: RMSNorm → MHA → Residual', '(1, 4, 8)', '交換 token 資訊'],
                ['Block 1: RMSNorm → SwiGLU → Residual', '(1, 4, 8)', '非線性轉換'],
                ['Block 2', '(1, 4, 8)', '重複堆疊'],
                ['Final RMSNorm', '(1, 4, 8)', '輸出前穩定化'],
                ['LM Head', '(1, 4, V=32)', '投影到 vocabulary'],
                ['Next Token', 'logits[:, -1, :]', '選出「原理」']
            ];
            container.innerHTML = `
                <div class="visualizer-title">
                    <span>Mini Decoder-only LLM Forward Pass</span>
                    <button class="btn" id="btn-mini-llm">下一層</button>
                </div>
                <div class="mini-llm-layers" id="mini-llm-layers"></div>
                <div class="viz-output" id="mini-llm-info">按「下一層」觀察資料 shape 如何流動。</div>
            `;
            const box = document.getElementById('mini-llm-layers');
            layers.forEach(([name, shape, desc], i) => {
                const el = document.createElement('div');
                el.className = 'mini-layer';
                el.id = `mini-layer-${i}`;
                el.innerHTML = `<strong>${i + 1}. ${name}</strong><span class="viz-code">${shape}</span><span style="color:var(--text-secondary)">${desc}</span>`;
                box.appendChild(el);
            });
            let idx = -1;
            document.getElementById('btn-mini-llm').addEventListener('click', () => {
                idx = (idx + 1) % layers.length;
                document.querySelectorAll('.mini-layer').forEach((el, i) => el.classList.toggle('active', i === idx));
                const [name, shape, desc] = layers[idx];
                document.getElementById('mini-llm-info').innerHTML = `<strong>${name}</strong><br>Shape: <span class="viz-code">${shape}</span><br>${desc}`;
            });
        }


        // Initialize Page
        window.addEventListener('DOMContentLoaded', loadBook);
    </script>
</body>
